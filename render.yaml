services:
  - type: web
    name: guardianshield-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SESSION_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: ABSTRACT_API_KEY
        sync: false
      - key: SIGHTENGINE_API_USER
        sync: false
      - key: SIGHTENGINE_API_SECRET
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: IPQS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: INSFORGE_SERVICE_ROLE_KEY
        sync: false
