<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - GuardianShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#1B2A4A',
                        accent: '#2563EB',
                        redAlert: '#DC2626',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 flex min-h-screen">
    <div class="min-h-screen w-full grid lg:grid-cols-2">
        <!-- Left Content Section -->
        <div
            class="relative hidden lg:flex flex-col justify-between bg-gradient-to-br from-navy/90 via-navy to-navy/80 p-12 text-white overflow-hidden">
            <div class="relative z-20">
                <a href="index.html" class="flex items-center gap-2 text-lg font-semibold hover:opacity-80 transition">
                    <div class="w-8 h-8 rounded-lg bg-white/10 backdrop-blur-sm flex items-center justify-center">
                        <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                    </div>
                    <span>GuardianShield</span>
                </a>
            </div>

            <div class="relative z-20 flex items-end justify-center h-[500px]">
                <!-- Cartoon Characters -->
                <div class="relative w-[550px] h-[400px]">
                    <!-- Purple character -->
                    <div id="char-purple" class="absolute bottom-0 transition-all duration-700 ease-in-out"
                        style="left:70px; width:180px; height:400px; background-color:#6C3FF5; border-radius:10px 10px 0 0; z-index:1; transform-origin:bottom center;">
                        <div id="purple-eyes" class="absolute flex gap-8 transition-all duration-700 ease-in-out">
                            <div class="eyeball rounded-full flex items-center justify-center transition-all duration-150 overflow-hidden"
                                style="width:18px; height:18px; background-color:white;">
                                <div class="pupil rounded-full transition-transform duration-100 ease-out"
                                    style="width:7px; height:7px; background-color:#2D2D2D;"></div>
                            </div>
                            <div class="eyeball rounded-full flex items-center justify-center transition-all duration-150 overflow-hidden"
                                style="width:18px; height:18px; background-color:white;">
                                <div class="pupil rounded-full transition-transform duration-100 ease-out"
                                    style="width:7px; height:7px; background-color:#2D2D2D;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Black character -->
                    <div id="char-black" class="absolute bottom-0 transition-all duration-700 ease-in-out"
                        style="left:240px; width:120px; height:310px; background-color:#2D2D2D; border-radius:8px 8px 0 0; z-index:2; transform-origin:bottom center;">
                        <div id="black-eyes" class="absolute flex gap-6 transition-all duration-700 ease-in-out">
                            <div class="eyeball rounded-full flex items-center justify-center transition-all duration-150 overflow-hidden"
                                style="width:16px; height:16px; background-color:white;">
                                <div class="pupil rounded-full transition-transform duration-100 ease-out"
                                    style="width:6px; height:6px; background-color:#2D2D2D;"></div>
                            </div>
                            <div class="eyeball rounded-full flex items-center justify-center transition-all duration-150 overflow-hidden"
                                style="width:16px; height:16px; background-color:white;">
                                <div class="pupil rounded-full transition-transform duration-100 ease-out"
                                    style="width:6px; height:6px; background-color:#2D2D2D;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Orange character -->
                    <div id="char-orange" class="absolute bottom-0 transition-all duration-700 ease-in-out"
                        style="left:0px; width:240px; height:200px; z-index:3; background-color:#FF9B6B; border-radius:120px 120px 0 0; transform-origin:bottom center;">
                        <div id="orange-eyes" class="absolute flex gap-8 transition-all duration-200 ease-out">
                            <div class="rounded-full flex items-center justify-center overflow-hidden"
                                style="width:12px; height:12px;">
                                <div class="pupil rounded-full transition-transform duration-100 ease-out"
                                    style="width:12px; height:12px; background-color:#2D2D2D;"></div>
                            </div>
                            <div class="rounded-full flex items-center justify-center overflow-hidden"
                                style="width:12px; height:12px;">
                                <div class="pupil rounded-full transition-transform duration-100 ease-out"
                                    style="width:12px; height:12px; background-color:#2D2D2D;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Yellow character -->
                    <div id="char-yellow" class="absolute bottom-0 transition-all duration-700 ease-in-out"
                        style="left:310px; width:140px; height:230px; background-color:#E8D754; border-radius:70px 70px 0 0; z-index:4; transform-origin:bottom center;">
                        <div id="yellow-eyes" class="absolute flex gap-6 transition-all duration-200 ease-out">
                            <div class="rounded-full flex items-center justify-center overflow-hidden"
                                style="width:12px; height:12px;">
                                <div class="pupil rounded-full transition-transform duration-100 ease-out"
                                    style="width:12px; height:12px; background-color:#2D2D2D;"></div>
                            </div>
                            <div class="rounded-full flex items-center justify-center overflow-hidden"
                                style="width:12px; height:12px;">
                                <div class="pupil rounded-full transition-transform duration-100 ease-out"
                                    style="width:12px; height:12px; background-color:#2D2D2D;"></div>
                            </div>
                        </div>
                        <div id="yellow-mouth"
                            class="absolute w-20 h-[4px] bg-[#2D2D2D] rounded-full transition-all duration-200 ease-out">
                        </div>
                    </div>
                </div>
            </div>

            <div class="relative z-20 flex items-center justify-between">
                <h1 class="text-3xl font-bold leading-tight z-20">Join thousands of Indians<br>already protected.</h1>
                <div class="flex items-center gap-8 text-sm text-white/60">
                    <a href="#" class="hover:text-white transition-colors">Privacy Policy</a>
                    <a href="#" class="hover:text-white transition-colors">Contact</a>
                </div>
            </div>

            <!-- Decorative elements -->
            <div class="absolute inset-0 bg-white/[0.05]"
                style="background-image: radial-gradient(circle, white 1px, transparent 1px); background-size: 20px 20px; opacity: 0.1;">
            </div>
            <div class="absolute top-1/4 right-1/4 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
            <div class="absolute bottom-1/4 left-1/4 w-96 h-96 bg-accent/20 rounded-full blur-3xl"></div>
        </div>

        <!-- Right Signup Section -->
        <div class="flex items-center justify-center p-8 bg-white relative h-screen overflow-y-auto">
            <div class="w-full max-w-[420px] my-auto">
                <!-- Mobile Logo -->
                <div class="lg:hidden flex items-center justify-center gap-2 text-lg font-semibold mb-8">
                    <div class="w-8 h-8 rounded-lg bg-navy/10 flex items-center justify-center">
                        <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                    </div>
                    <span>GuardianShield</span>
                </div>

                <!-- Header -->
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold tracking-tight mb-2 text-navy">Create Your Account</h2>
                    <p class="text-gray-500 text-sm">Free. No credit card required.</p>
                </div>

                <!-- Signup Form -->
                <form id="signup-form" class="space-y-4">
                    <div id="error-msg"
                        class="hidden bg-red-50 text-red-600 p-4 rounded-xl text-sm border border-red-100 text-center font-medium">
                    </div>

                    <div class="space-y-2">
                        <label for="name" class="text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" id="name" required placeholder="Anna Roberts" autocomplete="off"
                            class="flex h-11 w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent disabled:cursor-not-allowed disabled:opacity-50">
                    </div>

                    <div class="space-y-2">
                        <label for="email" class="text-sm font-medium text-gray-700">Email Address</label>
                        <input type="email" id="email" required placeholder="anna@example.com" autocomplete="off"
                            class="flex h-11 w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent disabled:cursor-not-allowed disabled:opacity-50">
                    </div>

                    <div class="space-y-2">
                        <label for="phone" class="text-sm font-medium text-gray-700">Phone Number (+91)</label>
                        <input type="tel" id="phone" required placeholder="9876543210" autocomplete="off"
                            class="flex h-11 w-full rounded-md border border-gray-300 bg-white px-3 py-2 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent disabled:cursor-not-allowed disabled:opacity-50">
                    </div>

                    <div class="space-y-2">
                        <label for="password" class="text-sm font-medium text-gray-700">Password</label>
                        <div class="relative">
                            <input type="password" id="password" required placeholder="••••••••"
                                class="flex h-11 w-full rounded-md border border-gray-300 bg-white px-3 py-2 pr-10 text-sm text-gray-900 placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent disabled:cursor-not-allowed disabled:opacity-50">
                            <button type="button" id="toggle-password"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                                <svg id="toggle-password-icon" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <!-- Eye off normally (default password state) -->
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="text-sm mt-4">
                        <label class="flex items-start gap-2 cursor-pointer mb-2">
                            <input type="checkbox" required
                                class="rounded border-gray-300 text-accent focus:ring-accent w-4 h-4 mt-0.5">
                            <span class="text-gray-600">I agree to the <a href="#"
                                    class="text-accent hover:underline">Privacy Policy</a> and <a href="#"
                                    class="text-accent hover:underline">TOS</a></span>
                        </label>
                        <label class="flex items-start gap-2 cursor-pointer">
                            <input type="checkbox" required
                                class="rounded border-gray-300 text-accent focus:ring-accent w-4 h-4 mt-0.5">
                            <span class="text-gray-600">I consent to analysis of call metadata for fraud
                                detection</span>
                        </label>
                    </div>

                    <button type="submit" id="submit-btn"
                        class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-base font-bold transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent disabled:pointer-events-none disabled:opacity-50 bg-accent text-white hover:bg-blue-600 h-12 w-full mt-4 shadow-sm">
                        <span id="btn-text">Create Account</span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative mt-4">
                    <div class="absolute inset-0 flex items-center">
                        <span class="w-full border-t border-gray-200"></span>
                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="bg-white px-3 text-gray-400 uppercase tracking-widest font-medium">or sign up with</span>
                    </div>
                </div>

                <!-- Google OAuth Button -->
                <div class="mt-3">
                    <a id="google-signup-btn" href="/api/auth/google"
                        class="inline-flex items-center justify-center gap-3 whitespace-nowrap rounded-md text-sm font-semibold transition-all duration-200 border border-gray-300 bg-white hover:bg-gray-50 hover:border-gray-400 hover:shadow-md text-gray-700 h-11 w-full">
                        <!-- Official Google "G" logo SVG -->
                        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                            <path fill="none" d="M0 0h48v48H0z"/>
                        </svg>
                        Continue with Google
                    </a>
                </div>

                <!-- Login Link -->
                <div class="text-center text-sm text-gray-500 mt-6">
                    Already have an account? <a href="login.html" class="text-accent font-medium hover:underline">Log
                        In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-animation.js"></script>
</body>

</html>
