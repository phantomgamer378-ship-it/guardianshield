<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - GuardianShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#1B2A4A',
                        accent: '#2563EB',
                        redAlert: '#DC2626',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 text-gray-900 min-h-screen pt-20 flex flex-col">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 bg-navy text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="home.html" class="flex items-center gap-2">
                <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span class="font-bold text-xl tracking-tight">GuardianShield</span>
            </a>
            <div class="flex items-center gap-4">
                <a href="home.html" class="px-4 py-2 rounded-lg hover:bg-white/10 transition text-sm font-medium">Back
                    to Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12 max-w-3xl">
        <div class="bg-white rounded-3xl p-8 md:p-12 shadow-sm border border-gray-100">
            <h1 class="text-3xl font-bold text-navy mb-8">Profile Settings</h1>

            <!-- Read-only profile view -->
            <div class="space-y-6 mb-12">
                <div class="flex items-center gap-6 mb-8 relative">
                    <div class="relative group">
                        <!-- Profile Image or Initial Avatar -->
                        <div id="p-avatar-container"
                            class="w-24 h-24 bg-blue-100 text-accent rounded-full flex items-center justify-center text-4xl font-bold overflow-hidden shadow-sm border-2 border-white relative">
                            <span id="p-initial">U</span>
                            <img id="p-avatar-img" class="absolute inset-0 w-full h-full object-cover hidden" src=""
                                alt="Profile Image">
                        </div>

                        <!-- Invisible File Input -->
                        <input type="file" id="p-avatar-upload" accept="image/*" class="hidden">

                        <!-- Upload Button Overlay on Hover -->
                        <label for="p-avatar-upload"
                            class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                            </svg>
                        </label>
                    </div>

                    <div>
                        <h2 class="text-2xl font-bold text-gray-800" id="p-name">Loading...</h2>
                        <span
                            class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-bold uppercase tracking-wide mt-2 inline-block">Free
                            tier</span>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-1">Email Address</label>
                        <div class="px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-gray-800 font-medium"
                            id="p-email">loading@email.com</div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-500 mb-1">Phone Number</label>
                        <div class="px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-gray-800 font-medium"
                            id="p-phone">+91 ----------</div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-500 mb-1">Account Created</label>
                    <div class="px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl text-gray-800 font-medium"
                        id="p-created">----------</div>
                </div>
            </div>

            <!-- Update Password Form -->
            <hr class="border-gray-100 my-10">
            <h3 class="text-xl font-bold text-navy mb-6">Security</h3>

            <div id="pwd-msg" class="hidden p-4 rounded-xl text-sm border text-center font-medium mb-6"></div>

            <form id="pwd-update-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                    <input type="password" id="currentPwd" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-accent focus:border-accent transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                    <input type="password" id="newPwd" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-accent focus:border-accent transition">
                </div>
                <button type="submit"
                    class="px-6 py-3 bg-navy hover:bg-gray-800 text-white rounded-xl font-bold shadow-md hover:-translate-y-0.5 transition flex items-center gap-2">
                    <span id="pwd-btn-text">Update Password</span>
                </button>
            </form>

            <hr class="border-gray-100 my-10">
            <h3 class="text-xl font-bold text-redAlert mb-4">Danger Zone</h3>
            <p class="text-sm text-gray-500 mb-4">Once you delete your account, there is no going back. Please be
                certain.</p>
            <button
                class="px-5 py-2.5 border border-redAlert text-redAlert rounded-xl font-bold hover:bg-red-50 transition">Delete
                Account</button>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
