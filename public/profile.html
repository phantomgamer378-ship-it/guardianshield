<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - GuardianShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#1B2A4A',
                        accent: '#2563EB',
                        redAlert: '#DC2626',
                    }
                }
            }
        }
    </script>
    <script src="js/theme-init.js"></script>
</head>

<body class="min-h-screen pt-20 flex flex-col" style="color: var(--col-text);">
    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-50 shadow-md" style="background: var(--col-surface); border-bottom: 1px solid var(--col-border);">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="home.html" class="flex items-center gap-2">
                <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span class="font-bold text-xl tracking-tight">GuardianShield</span>
            </a>
            <div class="flex items-center gap-4">
                <div id="theme-toggle" class="theme-toggle" role="button" tabindex="0" aria-label="Toggle light/dark mode" title="Toggle theme">
                    <div class="theme-toggle-knob" id="toggle-knob">
                        <svg id="knob-icon-moon" class="icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                        </svg>
                        <svg id="knob-icon-sun" class="icon-sun-gray" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:none;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10A5 5 0 0012 7z" />
                        </svg>
                    </div>
                    <div class="theme-toggle-passive" id="toggle-passive">
                        <svg id="passive-icon-sun" class="icon-sun-gray" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10A5 5 0 0012 7z" />
                        </svg>
                        <svg id="passive-icon-moon" class="icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:none;">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
                        </svg>
                    </div>
                </div>
                <a href="home.html" class="px-4 py-2 rounded-lg hover:bg-white/10 transition text-sm font-medium">Back
                    to Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12 max-w-3xl relative z-10">
        <div class="rounded-3xl p-8 md:p-12 shadow-sm border" style="background: var(--col-surface); border-color: var(--col-border);">
            <h1 class="text-3xl font-bold mb-8" style="color: var(--col-text);">Profile Settings</h1>

            <!-- Read-only profile view -->
            <div class="space-y-6 mb-12">
                <div class="flex items-center gap-6 mb-8 relative">
                    <div class="relative group">
                        <!-- Profile Image or Initial Avatar -->
                        <div id="p-avatar-container"
                            class="w-24 h-24 bg-blue-100 text-accent rounded-full flex items-center justify-center text-4xl font-bold overflow-hidden shadow-sm border-2 border-white relative">
                            <span id="p-initial">U</span>
                            <img id="p-avatar-img" class="absolute inset-0 w-full h-full object-cover hidden" src=""
                                alt="Profile Image">
                        </div>

                        <!-- Invisible File Input -->
                        <input type="file" id="p-avatar-upload" accept="image/*" class="hidden">

                        <!-- Upload Button Overlay on Hover -->
                        <label for="p-avatar-upload"
                            class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer text-white">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                            </svg>
                        </label>
                    </div>

                    <div>
                        <h2 class="text-2xl font-bold" id="p-name" style="color: var(--col-text);">Loading...</h2>
                        <span
                            class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-bold uppercase tracking-wide mt-2 inline-block">Free
                            tier</span>
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color: var(--col-text-muted);">Email Address</label>
                        <div class="px-4 py-3 border rounded-xl font-medium"
                            id="p-email" style="background: var(--col-surface-2); border-color: var(--col-border); color: var(--col-text);">loading@email.com</div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1" style="color: var(--col-text-muted);">Phone Number</label>
                        <div class="px-4 py-3 border rounded-xl font-medium"
                            id="p-phone" style="background: var(--col-surface-2); border-color: var(--col-border); color: var(--col-text);">+91 ----------</div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--col-text-muted);">Account Created</label>
                    <div class="px-4 py-3 border rounded-xl font-medium"
                        id="p-created" style="background: var(--col-surface-2); border-color: var(--col-border); color: var(--col-text);">----------</div>
                </div>
            </div>

            <!-- Update Password Form -->
            <hr class="my-10" style="border-color: var(--col-border);">
            <h3 class="text-xl font-bold mb-6" style="color: var(--col-text);">Security</h3>

            <div id="pwd-msg" class="hidden p-4 rounded-xl text-sm border text-center font-medium mb-6"></div>

            <form id="pwd-update-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--col-text);">Current Password</label>
                    <input type="password" id="currentPwd" required
                        class="w-full px-4 py-3 border rounded-xl focus:ring-accent focus:border-accent transition" style="background: var(--col-surface-2); border-color: var(--col-border); color: var(--col-text);">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" style="color: var(--col-text);">New Password</label>
                    <input type="password" id="newPwd" required
                        class="w-full px-4 py-3 border rounded-xl focus:ring-accent focus:border-accent transition" style="background: var(--col-surface-2); border-color: var(--col-border); color: var(--col-text);">
                </div>
                <button type="submit"
                    class="px-6 py-3 bg-navy hover:bg-gray-800 text-white rounded-xl font-bold shadow-md hover:-translate-y-0.5 transition flex items-center gap-2">
                    <span id="pwd-btn-text">Update Password</span>
                </button>
            </form>

            <hr class="my-10" style="border-color: var(--col-border);">
            <h3 class="text-xl font-bold text-redAlert mb-4">Danger Zone</h3>
            <p class="text-sm mb-4" style="color: var(--col-text-muted);">Once you delete your account, there is no going back. Please be
                certain.</p>
            <button
                class="px-5 py-2.5 border border-redAlert text-redAlert rounded-xl font-bold hover:bg-red-50 transition">Delete
                Account</button>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/shapegrid.js"></script>
    <script src="js/theme-toggle.js"></script>
    <canvas class="shapegrid-canvas" id="shapegrid-canvas"></canvas>
</body>

</html>
